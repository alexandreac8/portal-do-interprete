<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal do Intérprete</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde: #1a6b52;
      --verde-claro: #e8f5f0;
      --verde-medio: #2d8a6a;
      --texto: #1a1a1a;
      --texto-suave: #555;
      --borda: #d4e8e0;
      --fundo: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--fundo);
      color: var(--texto);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--verde);
      padding: 0 24px;
    }

    nav {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      color: #fff;
      font-size: 1.25rem;
      letter-spacing: -0.3px;
    }

    .logo span {
      opacity: 0.7;
      font-size: 0.85rem;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      margin-left: 8px;
    }

    /* HERO */
    .hero {
      background: var(--verde);
      padding: 56px 24px 72px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 0%, rgba(255,255,255,0.06) 0%, transparent 70%);
    }

    .hero h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      color: #fff;
      line-height: 1.15;
      position: relative;
    }

    .hero h1 em {
      font-style: italic;
      color: #a8dfca;
    }

    .hero p {
      color: rgba(255,255,255,0.75);
      font-size: 1.05rem;
      margin-top: 14px;
      font-weight: 300;
      position: relative;
    }

    .hero-stats {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 10px 22px;
      margin-top: 28px;
      position: relative;
    }

    .hero-stats .dot {
      width: 8px; height: 8px;
      background: #6ee7b7;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .hero-stats span {
      color: #fff;
      font-size: 0.95rem;
      font-weight: 500;
    }

    .hero-stats .count {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: #a8dfca;
    }

    /* MAIN */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* FILTROS */
    .filtros {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .filtro-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 8px 18px;
      border-radius: 100px;
      border: 1.5px solid var(--borda);
      background: var(--fundo);
      color: var(--texto-suave);
      cursor: pointer;
      transition: all 0.18s ease;
    }

    .filtro-btn:hover {
      border-color: var(--verde);
      color: var(--verde);
    }

    .filtro-btn.ativo {
      background: var(--verde);
      border-color: var(--verde);
      color: #fff;
    }

    /* ESTADO */
    .estado {
      text-align: center;
      padding: 80px 24px;
      color: var(--texto-suave);
    }

    .estado-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .estado h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      color: var(--texto);
      margin-bottom: 8px;
    }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--verde-claro);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .card {
      border: 1.5px solid var(--borda);
      border-radius: 16px;
      padding: 24px;
      background: var(--fundo);
      transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card:hover {
      box-shadow: 0 8px 32px rgba(26,107,82,0.10);
      transform: translateY(-2px);
      border-color: var(--verde-medio);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .card-titulo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--texto);
      line-height: 1.3;
      flex: 1;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 100px;
      white-space: nowrap;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .badge-presencial { background: #e8f5f0; color: #1a6b52; }
    .badge-remoto     { background: #e0f0ff; color: #1a5b9a; }
    .badge-hibrido    { background: #fef3e2; color: #a05a00; }

    .card-empresa {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--verde);
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--texto-suave);
    }

    .card-meta svg {
      flex-shrink: 0;
    }

    .card-desc {
      font-size: 0.88rem;
      color: var(--texto-suave);
      line-height: 1.55;
      flex: 1;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding-top: 4px;
    }

    .card-data {
      font-size: 0.78rem;
      color: #999;
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--verde);
      text-decoration: none;
      padding: 8px 16px;
      border: 1.5px solid var(--verde);
      border-radius: 100px;
      transition: all 0.18s ease;
    }

    .card-link:hover {
      background: var(--verde);
      color: #fff;
    }

    /* ATUALIZADO */
    .atualizado-bar {
      text-align: center;
      font-size: 0.82rem;
      color: #999;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--borda);
    }

    /* RESPONSIVO */
    @media (max-width: 600px) {
      .hero { padding: 40px 20px 56px; }
      .grid { grid-template-columns: 1fr; }
      .filtros { gap: 6px; }
      .filtro-btn { font-size: 0.82rem; padding: 7px 14px; }
    }
  </style>
</head>
<body>

<header>
  <nav>
    <div class="logo">Portal do Intérprete <span>Libras</span></div>
  </nav>
</header>

<section class="hero">
  <h1>Vagas para <em>intérpretes</em><br>e profissionais de Libras</h1>
  <p>Vagas atualizadas todo dia às 7h — Brasil inteiro</p>
  <div class="hero-stats">
    <div class="dot"></div>
    <span><span class="count" id="hero-count">—</span> vagas disponíveis hoje</span>
  </div>
</section>

<main>
  <div class="filtros">
    <button class="filtro-btn ativo" data-filtro="todos">Todos</button>
    <button class="filtro-btn" data-filtro="interprete">Intérprete</button>
    <button class="filtro-btn" data-filtro="professor">Professor</button>
    <button class="filtro-btn" data-filtro="instrutor">Instrutor</button>
    <button class="filtro-btn" data-filtro="remoto">Remoto</button>
    <button class="filtro-btn" data-filtro="freelancer">Freelancer</button>
  </div>

  <div id="conteudo">
    <div class="estado">
      <div class="spinner"></div>
      <p>Carregando vagas...</p>
    </div>
  </div>

  <div class="atualizado-bar" id="atualizado-bar" style="display:none">
    Última atualização: <span id="atualizado-data"></span>
  </div>
</main>

<script>
  let todasVagas = [];
  let filtroAtivo = 'todos';

  function badgeModalidade(modalidade) {
    if (!modalidade) return '';
    const m = modalidade.toLowerCase();
    if (m.includes('remoto')) return `<span class="badge badge-remoto">Remoto</span>`;
    if (m.includes('híbrido') || m.includes('hibrido')) return `<span class="badge badge-hibrido">Híbrido</span>`;
    return `<span class="badge badge-presencial">Presencial</span>`;
  }

  function renderCard(v) {
    return `
      <div class="card">
        <div class="card-header">
          <div class="card-titulo">${v.titulo || 'Vaga'}</div>
          ${badgeModalidade(v.modalidade)}
        </div>
        <div class="card-empresa">${v.empresa || ''}</div>
        <div class="card-meta">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
          ${v.local || 'Brasil'}
        </div>
        ${v.descricao ? `<div class="card-desc">${v.descricao}</div>` : ''}
        <div class="card-footer">
          <span class="card-data">${v.data || ''}</span>
          ${v.link ? `<a class="card-link" href="${v.link}" target="_blank" rel="noopener">
            Ver vaga
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/>
            </svg>
          </a>` : ''}
        </div>
      </div>`;
  }

  function aplicarFiltro(vagas, filtro) {
    if (filtro === 'todos') return vagas;
    return vagas.filter(v => {
      const texto = `${v.titulo} ${v.modalidade} ${v.descricao}`.toLowerCase();
      const local = (v.local || '').toLowerCase();
      if (filtro === 'remoto') return local.includes('remoto') || texto.includes('remoto');
      if (filtro === 'freelancer') return texto.includes('freelancer') || texto.includes('free-lancer');
      return texto.includes(filtro);
    });
  }

  function renderizar() {
    const conteudo = document.getElementById('conteudo');
    const filtradas = aplicarFiltro(todasVagas, filtroAtivo);

    if (filtradas.length === 0) {
      conteudo.innerHTML = `
        <div class="estado">
          <div class="estado-icon">🔍</div>
          <h3>Nenhuma vaga encontrada</h3>
          <p>Tente outro filtro ou volte mais tarde.</p>
        </div>`;
      return;
    }

    conteudo.innerHTML = `<div class="grid">${filtradas.map(renderCard).join('')}</div>`;
  }

  async function carregarVagas() {
    try {
      const res = await fetch('/api/vagas');
      const dados = await res.json();
      todasVagas = dados.vagas || [];

      document.getElementById('hero-count').textContent = todasVagas.length;

      if (dados.atualizado) {
        document.getElementById('atualizado-data').textContent = dados.atualizado;
        document.getElementById('atualizado-bar').style.display = 'block';
      }

      if (todasVagas.length === 0) {
        document.getElementById('conteudo').innerHTML = `
          <div class="estado">
            <div class="estado-icon">📋</div>
            <h3>Ainda sem vagas cadastradas</h3>
            <p>As vagas são atualizadas automaticamente todo dia às 7h.</p>
          </div>`;
        return;
      }

      renderizar();
    } catch (err) {
      document.getElementById('conteudo').innerHTML = `
        <div class="estado">
          <div class="estado-icon">⚠️</div>
          <h3>Erro ao carregar vagas</h3>
          <p>Tente recarregar a página.</p>
        </div>`;
    }
  }

  document.querySelectorAll('.filtro-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
      btn.classList.add('ativo');
      filtroAtivo = btn.dataset.filtro;
      renderizar();
    });
  });

  carregarVagas();
</script>
</body>
</html>
